<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreCoder Chat</title>
<style>
  :root {
    --bg: #1a1a2e;
    --sidebar: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --text: #e0e0e0;
    --dim: #8892b0;
    --tool-bg: #1a3a1a;
    --tool-border: #2d5a2d;
    --user-bg: #1e3a5f;
    --assistant-bg: #1a1a2e;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; background: var(--sidebar);
    display: flex; flex-direction: column;
    border-right: 1px solid #ffffff10;
    flex-shrink: 0;
  }
  #sidebar h2 {
    padding: 16px; font-size: 1.1rem;
    border-bottom: 1px solid #ffffff10;
    display: flex; align-items: center; gap: 8px;
  }
  #sidebar .logo { font-size: 1.4rem; }
  #new-session {
    margin: 12px; padding: 10px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); cursor: pointer;
    font-size: 0.95rem; font-weight: 600;
  }
  #new-session:hover { opacity: 0.85; }
  #session-list {
    flex: 1; overflow-y: auto; padding: 0 8px;
    list-style: none;
  }
  #session-list li {
    padding: 10px 12px; margin: 2px 0; border-radius: 8px;
    cursor: pointer; font-size: 0.88rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  #session-list li:hover { background: #ffffff0a; }
  #session-list li.active { background: #ffffff15; }
  #session-list .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  #session-list .del { opacity: 0; cursor: pointer; padding: 2px 6px; color: #f66; }
  #session-list li:hover .del { opacity: 1; }
  #status-bar {
    padding: 10px 14px; font-size: 0.78rem; color: var(--dim);
    border-top: 1px solid #ffffff10;
  }

  /* ── Main chat area ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0;
  }
  #header {
    padding: 12px 20px; border-bottom: 1px solid #ffffff10;
    font-size: 0.85rem; color: var(--dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ── Message bubbles ── */
  .msg { max-width: 85%; animation: fadeIn 0.2s; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg .role {
    font-size: 0.72rem; font-weight: 700; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .msg.user .role { color: #64b5f6; text-align: right; }
  .msg.assistant .role { color: #81c784; }
  .msg .body {
    padding: 12px 16px; border-radius: var(--radius);
    line-height: 1.55; font-size: 0.92rem;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .body { background: var(--user-bg); }
  .msg.assistant .body { background: var(--assistant-bg); border: 1px solid #ffffff10; }

  /* ── Tool call cards ── */
  .tool-call {
    margin: 6px 0; align-self: flex-start; max-width: 90%;
  }
  .tool-call summary {
    cursor: pointer; padding: 8px 12px;
    background: var(--tool-bg); border: 1px solid var(--tool-border);
    border-radius: var(--radius); font-size: 0.82rem;
    display: flex; gap: 8px; align-items: center;
  }
  .tool-call summary .icon { font-size: 1rem; }
  .tool-call summary .name { font-weight: 700; color: #a5d6a7; }
  .tool-call summary .args { color: var(--dim); font-family: monospace; font-size: 0.78rem; }
  .tool-call .result {
    padding: 8px 12px; margin-top: 4px;
    background: #0d1f0d; border-radius: 6px;
    font-family: monospace; font-size: 0.78rem; white-space: pre-wrap;
    max-height: 200px; overflow-y: auto;
    color: #a0a0a0; border-left: 3px solid var(--tool-border);
  }

  /* ── Input area ── */
  #input-area {
    padding: 12px 20px; border-top: 1px solid #ffffff10;
    display: flex; gap: 10px;
  }
  #input-area textarea {
    flex: 1; padding: 10px 14px; border-radius: var(--radius);
    border: 1px solid #ffffff20; background: #111;
    color: var(--text); font-size: 0.95rem; resize: none;
    font-family: inherit; line-height: 1.5;
  }
  #input-area textarea:focus { outline: none; border-color: var(--accent); }
  #input-area button {
    padding: 10px 20px; background: var(--accent);
    color: #fff; border: none; border-radius: var(--radius);
    cursor: pointer; font-weight: 600; font-size: 0.95rem;
    white-space: nowrap;
  }
  #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Misc ── */
  .empty-state {
    color: var(--dim); text-align: center; margin-top: 30vh;
    font-size: 1.1rem;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <h2><span class="logo">⚡</span> CoreCoder</h2>
  <button id="new-session" onclick="newSession()">＋ 新会话</button>
  <ul id="session-list"></ul>
  <div id="status-bar">模型: <span id="status-model">—</span></div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="header">
    <span id="current-title">选择一个会话开始</span>
    <span id="cost-display"></span>
  </div>
  <div id="messages">
    <div class="empty-state">← 新建或选择一个会话开始</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"
              onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="send()">发送</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────────
let currentSessionId = null;
let isStreaming = false;

// ──────────────────────────────────────────────────
//  Session management
// ──────────────────────────────────────────────────
async function newSession() {
  const resp = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
  const data = await resp.json();
  currentSessionId = data.session_id;
  document.getElementById('status-model').textContent = data.model;
  refreshSessions();
  clearMessages();
  document.getElementById('current-title').textContent = '新会话';
  document.getElementById('user-input').focus();
}

async function refreshSessions() {
  const resp = await fetch('/api/sessions');
  const list = await resp.json();
  const ul = document.getElementById('session-list');
  ul.innerHTML = list.map(s => `
    <li class="${s.id === currentSessionId ? 'active' : ''}" onclick="switchTo('${s.id}')">
      <span class="title">${esc(s.title)}</span>
      <span class="del" onclick="event.stopPropagation();delSession('${s.id}')">✕</span>
    </li>
  `).join('');
}

async function switchTo(sid) {
  currentSessionId = sid;
  refreshSessions();
  // load history
  const resp = await fetch(`/api/sessions/${sid}/history`);
  const data = await resp.json();
  document.getElementById('status-model').textContent = data.model;
  renderHistory(data.messages);
}

async function delSession(sid) {
  await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
  if (currentSessionId === sid) {
    currentSessionId = null;
    clearMessages();
    document.getElementById('current-title').textContent = '选择一个会话开始';
  }
  refreshSessions();
}

// ──────────────────────────────────────────────────
//  Send message & SSE stream
// ──────────────────────────────────────────────────
async function send() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  if (!currentSessionId) { await newSession(); }

  input.value = '';
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('current-title').textContent = text.slice(0, 40);

  // show user bubble
  appendMessage('user', text);

  // create assistant bubble placeholder for streaming
  const assistDiv = appendMessage('assistant', '');
  const bodyEl = assistDiv.querySelector('.body');
  let fullText = '';
  let pendingToolDiv = null;

  try {
    const resp = await fetch(`/api/chat/${currentSessionId}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // SSE parser: split on double-newline
      const parts = buf.split('\n\n');
      buf = parts.pop(); // keep incomplete chunk

      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(part.slice(6));
          handleSSE(event, bodyEl, assistDiv);
          if (event.type === 'token') fullText += event.content;
        } catch (e) { /* skip malformed */ }
      }
    }
  } catch (err) {
    bodyEl.textContent = `❌ 错误: ${err.message}`;
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
    refreshSessions();
  }
}

function handleSSE(event, bodyEl, assistDiv) {
  switch (event.type) {
    case 'token':
      bodyEl.textContent += event.content;
      // scroll to bottom
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      break;

    case 'tool_start': {
      const details = document.createElement('details');
      details.className = 'tool-call';
      details.dataset.toolId = event.id;  // match result by id, not "first spinner"
      details.open = true;
      details.innerHTML = `
        <summary>
          <span class="icon">🔧</span>
          <span class="name">${esc(event.name)}</span>
          <span class="args">${esc(event.args || '')}</span>
          <span class="spinner"></span>
        </summary>
        <div class="result">执行中…</div>
      `;
      assistDiv.parentNode.insertBefore(details, assistDiv.nextSibling);
      break;
    }

    case 'tool_result': {
      // match by tool_call id so parallel tool results don't get cross-wired
      const details = document.querySelector(`.tool-call[data-tool-id="${event.id}"]`);
      if (details) {
        const spinner = details.querySelector('.spinner');
        if (spinner) spinner.remove();
        details.querySelector('.result').textContent = event.preview || '(无输出)';
        details.open = false;  // auto-collapse after result
      }
      break;
    }

    case 'done':
      // final text already streamed
      break;

    case 'error':
      bodyEl.textContent += `\n\n❌ ${event.message}`;
      break;
  }
}

// ──────────────────────────────────────────────────
//  UI helpers
// ──────────────────────────────────────────────────
function appendMessage(role, content) {
  const msgs = document.getElementById('messages');
  // remove empty state
  const emp = msgs.querySelector('.empty-state');
  if (emp) emp.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="role">${role === 'user' ? 'You' : 'CoreCoder'}</div>
    <div class="body">${esc(content)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function renderHistory(messages) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  if (!messages.length) {
    msgs.innerHTML = '<div class="empty-state">开始对话吧</div>';
    return;
  }
  for (const m of messages) {
    if (m.role === 'user') {
      appendMessage('user', m.content);
    } else if (m.role === 'assistant') {
      const div = appendMessage('assistant', m.content || '');
      // show tool calls if present
      if (m.tool_calls) {
        for (const tc of m.tool_calls) {
          const details = document.createElement('details');
          details.className = 'tool-call';
          details.innerHTML = `
            <summary>
              <span class="icon">🔧</span>
              <span class="name">${esc(tc.function?.name || tc.name)}</span>
              <span class="args">${esc(JSON.stringify(tc.function?.arguments || tc.arguments || {}))}</span>
            </summary>
          `;
          msgs.appendChild(details);
        }
      }
    } else if (m.role === 'tool') {
      const details = document.createElement('details');
      details.className = 'tool-call';
      details.innerHTML = `
        <summary><span class="icon">📋</span> <span class="name">工具结果</span></summary>
        <div class="result">${esc((m.content || '').slice(0, 500))}</div>
      `;
      msgs.appendChild(details);
    }
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function clearMessages() {
  document.getElementById('messages').innerHTML = '<div class="empty-state">开始对话吧</div>';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ──────────────────────────────────────────────────
//  Init
// ──────────────────────────────────────────────────
refreshSessions();
document.getElementById('user-input').focus();
</script>
</body>
</html>
